# ros2_controllers configuration for ABB GoFa CRB15000 with MuJoCo
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    # Joint trajectory controller for MuJoCo
    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # State broadcaster for joint states
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

joint_trajectory_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    gains:
      joint_1: {p: 100.0, i: 0.0, d: 10.0}
      joint_2: {p: 100.0, i: 0.0, d: 10.0}
      joint_3: {p: 100.0, i: 0.0, d: 10.0}
      joint_4: {p: 100.0, i: 0.0, d: 10.0}
      joint_5: {p: 100.0, i: 0.0, d: 10.0}
      joint_6: {p: 100.0, i: 0.0, d: 10.0}
    state_joint_names: ["joint_1", "joint_2", "joint_3", "joint_4", "joint_5", "joint_6"]
    allow_nonzero_velocity_at_trajectory_end: true