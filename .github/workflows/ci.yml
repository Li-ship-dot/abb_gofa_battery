name: ROS2 CI Build + Mock Chain Test

# ============================================================
# ROS2 项目 CI 模板 — 基于 abb_vision 项目实践
# 适用于: ROS2 Humble on Ubuntu 22.04
# ============================================================

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    runs-on: ubuntu-22.04
    container: osrf/ros:humble-perjammy

    steps:
    - uses: actions/checkout@v4

    - name: Fix permissions
      run: sudo chown -R runner:runner /home/i/ros2_ws

    - name: Install dependencies
      run: |
        source /opt/ros/humble/setup.bash
        rosdep init
        rosdep update
        rosdep install --from-paths src --ignore-src -r -y

    - name: Build
      run: |
        source /opt/ros/humble/setup.bash
        colcon build --merge-install 2>&1

    - name: Lint (ament_lint)
      run: |
        source /opt/ros/humble/setup.bash
        colcon lint --merge-install --result-mode warn --packages-select abb_bringup || true

    - name: Test (unit + smoke tests)
      run: |
        source /opt/ros/humble/setup.bash
        colcon test --merge-install --event-handlers console_direct+ \
          --packages-select abb_bringup \
          --pytest-args -v
        colcon test-result --verbose

  mock-chain-test:
    runs-on: ubuntu-22.04
    container: osrf/ros:humble-perjammy
    needs: build

    steps:
    - uses: actions/checkout@v4

    - name: Fix permissions
      run: sudo chown -R runner:runner /home/i/ros2_ws

    - name: Build (needed for test)
      run: |
        source /opt/ros/humble/setup.bash
        colcon build --merge-install 2>&1

    - name: Mock Chain E2E Integration Test
      run: |
        source /opt/ros/humble/setup.bash
        source install/setup.bash

        # Kill any existing processes
        pkill -9 -f abb_bringup 2>/dev/null || true
        pkill -9 -f abb_vision 2>/dev/null || true
        pkill -9 -f ros2 2>/dev/null || true
        sleep 3

        # Stop and restart ros2 daemon for clean state
        ros2 daemon stop 2>/dev/null || true
        sleep 1
        ros2 daemon start 2>/dev/null || true
        sleep 2

        # Run mock chain integration test
        python3 -m pytest src/abb_omnicore_ros2/abb_bringup/test/test_mock_chain_integration.py \
          -v --tb=short 2>&1

    - name: Upload Mock Chain Test Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: mock-chain-logs
        path: /home/i/ros2_ws/log/*.log
        retention-days: 7
